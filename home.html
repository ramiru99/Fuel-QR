<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuel QR Registration System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f3f5f7;
      color:#000;
    }


    .top-header{
      background:#fff;
      padding:25px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #ddd;
    }

    .top-header h1{
      font-size:20px;
      font-weight:600;
    }

    .logout{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-weight:500;
    }


    .navbar{
      background:#fff;
      padding:20px 40px;
      display:flex;
      gap:40px;
      border-bottom:1px solid #ddd;
    }

    .nav-item{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-weight:500;
      color:#000;
    }


    .container{
      padding:50px 40px;
    }

    .welcome-title{
      font-size:50px;
      font-weight:700;
      margin-bottom:5px;
    }

    .subtitle{
      color:#6b7280;
      font-size:20px;
      margin-bottom:40px;
    }


    .card{
      background:#fff;
      border-radius:20px;
      padding:40px;
      border:1px solid #e5e7eb;
    }

    .card-title{
      font-size:40px;
      font-weight:600;
      margin-bottom:10px;
    }

    .card-subtitle{
      color:#6b7280;
      margin-bottom:40px;
      font-size:18px;
    }


    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px 80px;
    }

    .form-group label{
      display:block;
      font-weight:600;
      margin-bottom:15px;
      font-size:18px;
    }

    .form-group input,
    .form-group select{
      width:100%;
      padding:16px;
      border:1px solid #d1d5db;
      border-radius:10px;
      font-size:17px;
      outline:none;
      background:#fff;
    }

    .form-group input:focus,
    .form-group select:focus{
      border-color:#2563eb;
    }


    .btn{
      margin-top:40px;
      padding:16px 35px;
      background:#111827;
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#000;
    }


    @media(max-width:900px){

      .navbar{
        flex-wrap:wrap;
        gap:20px;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .welcome-title{
        font-size:38px;
      }

      .card-title{
        font-size:30px;
      }

    }

  </style>
</head>
<body>


  <div class="top-header">
    <h1>Fuel QR Registration System</h1>

    <div class="logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      Logout
    </div>
  </div>


  <div class="navbar">

    <div class="nav-item">
      <i class="fa-solid fa-house"></i>
      Home
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-location-dot"></i>
      Station
    </div>

    <div class="nav-item">
      <i class="fa-regular fa-file"></i>
      Fuel Type
    </div>

    <div class="nav-item">
      <i class="fa-regular fa-credit-card"></i>
      Owner NIC
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-car"></i>
      Vehicle
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-qrcode"></i>
      QR Code
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-gauge"></i>
      Quota
    </div>

  </div>


  <div class="container">

    <h1 class="welcome-title">Welcome!</h1>
    <p class="subtitle">Manage your fuel quota registrations</p>

    <!-- CARD -->

    <div class="card">

      <h2 class="card-title">
        <i class="fa-solid fa-plus"></i>
        Register New Vehicle
      </h2>

      <p class="card-subtitle">
        Add a vehicle to the fuel quota system
      </p>

      <!-- FORM -->

      <form>

        <div class="form-grid">

          <div class="form-group">
            <label>Vehicle Registration No</label>
            <input type="text" placeholder="ABC-1234">
          </div>

          <div class="form-group">
            <label>Vehicle Model</label>
            <input type="text" placeholder="Toyota Corolla 2020">
          </div>

          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John">
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe">
          </div>

          <div class="form-group">
            <label>Owner NIC</label>
            <input type="text" placeholder="123456789V">
          </div>

          <div class="form-group">
            <label>Fuel Type</label>

            <select>
              <option>Select fuel type</option>
              <option>Petrol</option>
              <option>Diesel</option>
            </select>
          </div>

          <div class="form-group">
            <label>Nearest Fuel Station</label>

            <select>
              <option>Select station</option>
              <option>IOC Station</option>
              <option>Ceypetco</option>
            </select>
          </div>

          <div class="form-group">
            <label>Weekly Fuel Quota (Liters)</label>
            <input type="number" placeholder="40">
          </div>

        </div>

        <button class="btn">Register Vehicle</button>

      </form>

    </div>

  </div>

</body>
</html>
